# path: .github/workflows/blank.yml
name: Android CI
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Install Gradle 8.0 (temporary workaround)
        run: |
          wget https://services.gradle.org/distributions/gradle-8.0-bin.zip -P /tmp
          sudo unzip -q -d /opt /tmp/gradle-8.0-bin.zip
          echo "/opt/gradle-8.0/bin" >> $GITHUB_PATH

      - name: Build Debug APK
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: book-pdf-app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
